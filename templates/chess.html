<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Chess + QTE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #board {
      display: grid;
      grid-template-columns: repeat(8, 70px);
      grid-template-rows: repeat(8, 70px);
      border: 2px solid #444;
      margin: auto;
    }
    .square {
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      cursor: pointer;
      user-select: none;
    }
    .light { background: #b59a7a; }
    .dark { background: #6b4f3f; }
    .selected { outline: 3px solid yellow; }

    #qte-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 2000;
    }
    #qte-container {
      display: flex;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .qte-prompt {
      padding: 10px 16px;
      border-radius: 6px;
      background: #333;
      font-size: 24px;
    }
    .active-prompt {
      background: #ffcc66;
      border: 2px solid #ff9900;
      color: #000;
    }
    #qte-bar-wrapper {
      width: 300px;
      height: 12px;
      background: #444;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    #qte-bar {
      height: 100%;
      width: 100%;
      background: #28a745;
      transition: width 0.05s linear;
    }
    #qte-score {
      margin-top: 0.5rem;
    }
  </style>
</head>
<body class="bg-dark text-light">
<nav class="navbar navbar-dark bg-black px-3">
  <a href="index.html" class="navbar-brand">← Menu</a>
  <span class="navbar-text">Chess + QTE</span>
</nav>

<div class="container mt-4">
  <div class="d-flex gap-2 mb-3">
    <button id="new-pvc" class="btn btn-primary">New PvC (AI Black)</button>
    <button id="new-pvp" class="btn btn-secondary">New PvP</button>
  </div>

  <div id="board"></div>
  <div id="info" class="mt-3 fs-5"></div>
</div>

<div id="qte-overlay" class="d-flex">
  <h2 class="mb-3">Battle!</h2>
  <div id="qte-container"></div>
  <div id="qte-bar-wrapper"><div id="qte-bar"></div></div>
  <p id="qte-hint" class="text-info mb-1"></p>
  <div id="qte-score" class="text-center">
    <div>Score: <span id="qte-score-value">0</span></div>
    <div>Combo: <span id="qte-combo">0</span> | Max Combo: <span id="qte-max-combo">0</span></div>
    <div>Accuracy: <span id="qte-accuracy">0</span>%</div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
