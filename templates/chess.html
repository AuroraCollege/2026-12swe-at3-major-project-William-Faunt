<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Chess</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #board {
      display: grid;
      grid-template-columns: repeat(8, 70px);
      grid-template-rows: repeat(8, 70px);
      border: 2px solid #444;
      margin: auto;
    }
    .square {
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      cursor: pointer;
      user-select: none;
      box-sizing: border-box;
    }
    .light { background: #b59a7a; }
    .dark { background: #6b4f3f; }
    .selected {
      box-shadow: inset 0 0 0 4px yellow;
    }

    .qte-player-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      min-width: 160px;
    }

    .qte-player-title {
      font-size: 18px;
      color: #ddd;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .qte-player-upcoming {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .qte-player-upcoming .qte-prompt {
      background: #222;
      font-size: 18px;
      padding: 8px 12px;
    }

    #promotion-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }

    .promotion-button {
      min-width: 60px;
    }

    #qte-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 2000;
    }
    #qte-container {
      display: flex;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .qte-prompt {
      padding: 10px 16px;
      border-radius: 6px;
      background: #333;
      font-size: 24px;
    }
    .active-prompt {
      background: #ffcc66;
      border: 2px solid #ff9900;
      color: #000;
    }
    #qte-bar-wrapper {
      width: 300px;
      height: 12px;
      background: #444;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    #qte-bar {
      height: 100%;
      width: 100%;
      background: #28a745;
      transition: width 0.05s linear;
    }
    #qte-score {
      margin-top: 0.5rem;
    }
    .center-page {
      min-height: calc(100vh - 90px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .piece-img {
      width: 56px;
      height: 56px;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-dark text-light">
<nav class="navbar navbar-dark bg-success px-3">
  <a href="/" class="navbar-brand">← Menu</a>
  <span class="navbar-text">Chess + QTE</span>
</nav>

<div class="container mt-4 center-page">
  <div class="d-flex gap-2 mb-3 justify-content-center">
    <button id="new-pvc" class="btn btn-primary">New PvC (AI Black)</button>
    <button id="new-pvp" class="btn btn-secondary">New PvP</button>
  </div>

  <div id="board"></div>
  <div id="turn-indicator" class="mt-2 mb-2 text-center fs-4 fw-bold" style="padding: 0.5rem; border-radius: 0.5rem;"></div>
  <div id="info" class="mt-3 fs-5 text-center"></div>
</div>

<div id="qte-overlay">
  <h2 class="mb-3">Battle!</h2>
  <div id="qte-player-bars" class="w-100 mb-3">
    <div class="d-flex justify-content-between mb-2">
      <div><strong>Defender</strong> <span id="qte-defender-label">?</span></div>
      <div><strong>Attacker</strong> <span id="qte-attacker-label">?</span></div>
    </div>
    <div class="progress" style="height: 24px; background: #8b0000; border-radius: 12px; overflow: hidden;">
      <div id="qte-shared-bar" style="width: 50%; height: 100%; background: #28a745; transition: width 0.2s ease;"></div>
    </div>
    <div class="d-flex justify-content-between mt-2 text-light small">
      <div>Defender: <span id="qte-defender-score">0</span></div>
      <div>Attacker: <span id="qte-attacker-score">0</span></div>
    </div>
  </div>
  <div id="qte-container"></div>
  <div id="qte-bar-wrapper"><div id="qte-bar"></div></div>
  <p id="qte-hint" class="text-info mb-1"></p>
  <div id="qte-score" class="text-center">
    <div>Score: <span id="qte-score-value">0</span></div>
    <div>Combo: <span id="qte-combo">0</span> | Max Combo: <span id="qte-max-combo">0</span></div>
    <div>Accuracy: <span id="qte-accuracy">0</span>%</div>
  </div>
</div>

<div id="promotion-overlay" style="display:none; position:fixed; inset:0; z-index:3000; background:rgba(0,0,0,0.9); align-items:center; justify-content:center;">
  <div class="bg-black rounded-3 border border-secondary p-4 text-center" style="min-width:280px;">
    <h3 id="promotion-title" class="mb-3">Promote pawn</h3>
    <div class="d-flex gap-2 justify-content-center">
      <button type="button" class="btn btn-light promotion-button" data-piece="q">Queen</button>
      <button type="button" class="btn btn-light promotion-button" data-piece="r">Rook</button>
      <button type="button" class="btn btn-light promotion-button" data-piece="b">Bishop</button>
      <button type="button" class="btn btn-light promotion-button" data-piece="n">Knight</button>
    </div>
  </div>
</div>

<script>
  function isDisallowedQteKey(key) {
    if (!key || typeof key !== "string") return true;
    const trimmed = key.trim();
    if (trimmed.length === 0) return true;
    const invalid = new Set([
      " ", "Spacebar", "Space", "Enter", "Tab", "Escape", "Esc",
      "Shift", "Control", "Alt", "Meta", "CapsLock", "NumLock",
      "ScrollLock", "Pause", "ContextMenu", "OS", "Insert", "Home",
      "End", "PageUp", "PageDown", "F1", "F2", "F3", "F4", "F5",
      "F6", "F7", "F8", "F9", "F10", "F11", "F12", "F13", "F14",
      "F15", "F16", "F17", "F18", "F19", "F20", "F21", "F22",
      "F23", "F24", "BrowserBack", "BrowserForward", "BrowserRefresh",
      "BrowserStop", "BrowserSearch", "BrowserFavorites", "BrowserHome",
      "VolumeMute", "VolumeDown", "VolumeUp", "MediaTrackNext",
      "MediaTrackPrevious", "MediaStop", "MediaPlayPause", "PrintScreen",
      "Unidentified", "Dead"
    ]);
    return invalid.has(key);
  }

  function sanitizeCustomKeymap(keys) {
    if (!keys || typeof keys !== "object") return null;
    const customKeys = {
      Up: keys.Up || "",
      Down: keys.Down || "",
      Left: keys.Left || "",
      Right: keys.Right || ""
    };
    const values = Object.values(customKeys);
    if (values.some(k => isDisallowedQteKey(k))) return null;
    if (new Set(values).size < 4) return null;
    return customKeys;
  }

  function loadQteSettings() {
  const stored = JSON.parse(localStorage.getItem("qteSettings") || "{}");
  const difficulty = stored.difficulty || "medium";
  const preset = stored.preset || "WASD";
  let keymap;
  if (preset === "CUSTOM" && stored.customKeys) {
    const customMap = sanitizeCustomKeymap(stored.customKeys);
    if (customMap) {
      keymap = customMap;
    } else {
      keymap = { Up: "w", Down: "s", Left: "a", Right: "d" };
    }
  } else if (preset === "ARROWS") {
    keymap = { Up: "ArrowUp", Down: "ArrowDown", Left: "ArrowLeft", Right: "ArrowRight" };
  } else {
    keymap = { Up: "w", Down: "s", Left: "a", Right: "d" };
  }
  let duration;
  if (difficulty === "easy") duration = 1200;
  else if (difficulty === "hard") duration = 600;
  else duration = 900;
  return { difficulty, keymap, duration };
}

const qteSettings = loadQteSettings();
const PVP_KEYMAPS = {
  attacker: { Up: "w", Down: "s", Left: "a", Right: "d" },
  defender: { Up: "ArrowUp", Down: "ArrowDown", Left: "ArrowLeft", Right: "ArrowRight" }
};
const ALL_PVP_KEYS = [...Object.values(PVP_KEYMAPS.attacker), ...Object.values(PVP_KEYMAPS.defender)];

let gameId = null;
let gameState = null;
let selectedSquare = null;
let mode = "pvc";

// QTE state
let qteSequence = [];
let qteIndex = 0;
let qteActive = false;
let qteMode = "normal";
let qtePrompt = null;
let qteQueue = [];
let qteAttackerPrompt = null;
let qteAttackerQueue = [];
let qteDefenderPrompt = null;
let qteDefenderQueue = [];
let qteStartTime = 0;
let qteSessionStart = 0;
let qteSessionDuration = 0;
let qteDuration = qteSettings.duration;
let qteTimerId = null;
let qteScore = 0;
let qteHits = 0;
let qteMisses = 0;
let qteCombo = 0;
let qteMaxCombo = 0;
let qteAttackerScore = 0;
let qteDefenderScore = 0;
let qteAttackerHits = 0;
let qteDefenderHits = 0;
let qteAttackerMisses = 0;
let qteDefenderMisses = 0;
let qteAttackerCombo = 0;
let qteDefenderCombo = 0;
let qteAttackerMaxCombo = 0;
let qteDefenderMaxCombo = 0;
let qteAttackerColor = null;
let qteDefenderColor = null;
let qteSharedPosition = 50;
// PvP per-color prompt state (left=White, right=Black)
let qteWhitePrompt = null;
let qteWhiteQueue = [];
let qteWhiteRole = null;
let qteBlackPrompt = null;
let qteBlackQueue = [];
let qteBlackRole = null;

// Sounds (you can replace with real files)
const sHit = new Audio();
const sMiss = new Audio();

async function apiPost(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  return await res.json();
}

document.getElementById("new-pvc").addEventListener("click", async () => {
  mode = "pvc";
  const data = await apiPost("/api/new_game", {
    mode: "pvc",
    ai_side: "black",
    difficulty: qteSettings.difficulty
  });
  gameId = data.game_id;
  await loadState();
});

document.getElementById("new-pvp").addEventListener("click", async () => {
  mode = "pvp";
  const data = await apiPost("/api/new_game", {
    mode: "pvp",
    ai_side: "none",
    difficulty: qteSettings.difficulty
  });
  gameId = data.game_id;
  await loadState();
});

async function loadState() {
  const res = await fetch(`/api/state/${gameId}`);
  gameState = await res.json();
  renderBoard(gameState.fen);

  const status = gameState.game_status || { finished: false };
  if (status.finished) {
    const outcome = status.result === "win"
      ? `${status.winner} wins by ${status.reason}`
      : `Draw by ${status.reason}`;
    document.getElementById("info").textContent = `${outcome}`;
    document.getElementById("turn-indicator").textContent = "";
  } else {
    document.getElementById("info").textContent =
      `Turn: ${gameState.turn} | Mode: ${gameState.mode}`;
    const turnIndicator = document.getElementById("turn-indicator");
    turnIndicator.textContent = `${gameState.turn.charAt(0).toUpperCase() + gameState.turn.slice(1)}'s Turn`;
    turnIndicator.style.backgroundColor = gameState.turn === "white" ? "#f8f9fa" : "#343a40";
    turnIndicator.style.color = gameState.turn === "white" ? "#000" : "#fff";
  }

  if (!status.finished && mode === "pvc" && gameState.turn === gameState.ai_side) {
    await aiMove();
  }
}

function renderBoard(fen) {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  const rows = fen.split(" ")[0].split("/");
  for (let r = 0; r < 8; r++) {
    let row = rows[r];
    let file = 0;
    for (let char of row) {
      if (isNaN(char)) {
        boardDiv.appendChild(createSquare(r, file, char));
        file++;
      } else {
        for (let i = 0; i < parseInt(char); i++) {
          boardDiv.appendChild(createSquare(r, file, null));
          file++;
        }
      }
    }
  }
}

function createSquare(r, file, piece) {
  const sq = document.createElement("div");
  sq.classList.add("square");
  sq.classList.add((r + file) % 2 === 1 ? "dark" : "light");
  const coord = "abcdefgh"[file] + (8 - r);
  sq.dataset.square = coord;
  if (piece) {
    const img = document.createElement('img');
    img.classList.add('piece-img');
    img.src = fenToSvg(piece);
    img.alt = piece;
    sq.appendChild(img);
  } else {
    sq.textContent = "";
  }
  sq.addEventListener("click", () => onSquareClick(coord, sq));
  return sq;
}

function fenToSvg(piece) {
  // Map a FEN piece letter to the static SVG filename in static/Pieces
  if (!piece) return '';
  const isWhite = piece === piece.toUpperCase();
  const p = piece.toLowerCase();
  const prefix = isWhite ? 'W' : 'B';
  return `/static/Pieces/${prefix}${p}.svg`;
}

function parseFenPieceMap(fen) {
  const rows = fen.split(" ")[0].split("/");
  const map = {};
  for (let r = 0; r < 8; r++) {
    let file = 0;
    for (const char of rows[r]) {
      if (isNaN(char)) {
        const coord = "abcdefgh"[file] + (8 - r);
        map[coord] = char;
        file++;
      } else {
        file += parseInt(char, 10);
      }
    }
  }
  return map;
}

function getPieceAtSquare(square) {
  if (!gameState || !gameState.fen) return null;
  const map = parseFenPieceMap(gameState.fen);
  return map[square] || null;
}

function isPromotionMove(from, to) {
  const piece = getPieceAtSquare(from);
  if (!piece) return false;
  if (piece === "P" && to[1] === "8") return true;
  if (piece === "p" && to[1] === "1") return true;
  return false;
}

function choosePromotionPiece(piece) {
  return new Promise((resolve) => {
    const overlay = document.getElementById("promotion-overlay");
    const title = document.getElementById("promotion-title");
    title.textContent = `Promote ${piece.toUpperCase()} pawn`;
    overlay.style.display = "flex";

    const buttons = overlay.querySelectorAll(".promotion-button");
    buttons.forEach((button) => {
      button.onclick = () => {
        overlay.style.display = "none";
        resolve(button.dataset.piece);
      };
    });
  });
}

async function onSquareClick(coord, element) {
  if (!gameId || qteActive || (gameState && gameState.game_status && gameState.game_status.finished)) return;

  if (!selectedSquare) {
    selectedSquare = coord;
    element.classList.add("selected");
  } else {
    let move = selectedSquare + coord;
    if (isPromotionMove(selectedSquare, coord)) {
      const piece = getPieceAtSquare(selectedSquare);
      const promotion = await choosePromotionPiece(piece || "P");
      if (!promotion) return;
      move += promotion;
    }
    clearSelection();
    selectedSquare = null;
    await sendMove(move);
  }
}

function clearSelection() {
  document.querySelectorAll(".square").forEach(s => s.classList.remove("selected"));
}

async function sendMove(move) {
  const data = await apiPost(`/api/move/${gameId}`, { move });

  if (data.type === "qte") {
    const attackerColor = gameState.turn;
    const defenderColor = attackerColor === "white" ? "black" : "white";
    startQTE(data.sequence, mode === "pvp" ? "pvp" : "normal", { attacker_color: attackerColor, defender_color: defenderColor });
  } else {
    await loadState();
  }
}

async function aiMove() {
  const data = await apiPost(`/api/ai_move/${gameId}`, {});
  if (data.type === "qte") {
    startQTE(data.sequence, "normal", { attacker_color: gameState.turn, defender_color: gameState.turn === "white" ? "black" : "white" });
  } else {
    await loadState();
  }
}

function randomDirection() {
  return ["Up", "Down", "Left", "Right"][Math.floor(Math.random() * 4)];
}

function startQTE(sequence, type = "normal", meta = {}) {
  qteMode = type;
  qteActive = true;
  qteScore = 0;
  qteHits = 0;
  qteMisses = 0;
  qteCombo = 0;
  qteMaxCombo = 0;
  qteAttackerScore = 0;
  qteDefenderScore = 0;
  qteAttackerHits = 0;
  qteDefenderHits = 0;
  qteAttackerMisses = 0;
  qteDefenderMisses = 0;
  qteAttackerCombo = 0;
  qteDefenderCombo = 0;
  qteAttackerMaxCombo = 0;
  qteDefenderMaxCombo = 0;
  qteAttackerColor = meta.attacker_color;
  qteDefenderColor = meta.defender_color;
  qteSharedPosition = 50;

  document.getElementById("qte-overlay").style.display = "flex";

  if (qteMode === "pvp") {
    qteSessionDuration = 10000 + Math.floor(Math.random() * 10001);
    qteSessionStart = performance.now();
    const sequenceList = Array.isArray(sequence) && sequence.length ? sequence : [];
    qteAttackerPrompt = sequenceList[0] || randomDirection();
    qteAttackerQueue = sequenceList.slice(1, 4);
    while (qteAttackerQueue.length < 3) qteAttackerQueue.push(randomDirection());
    qteDefenderPrompt = sequenceList[1] || randomDirection();
    qteDefenderQueue = sequenceList.slice(2, 5);
    while (qteDefenderQueue.length < 3) qteDefenderQueue.push(randomDirection());

    document.getElementById("qte-hint").textContent =
      `Attacker: WASD | Defender: Arrow keys | ${Math.round(qteSessionDuration / 1000)}s battle`;
    document.getElementById("qte-attacker-label").textContent = qteAttackerColor;
    document.getElementById("qte-defender-label").textContent = qteDefenderColor;
  } else {
    qteSequence = Array.isArray(sequence) ? sequence : [];
    qteIndex = 0;
    document.getElementById("qte-hint").textContent =
      `Press: ${Object.entries(qteSettings.keymap).map(([dir, key]) => `${dir}=${key}`).join("  ")}`;
    qtePrompt = null;
    qteQueue = [];
    qteAttackerPrompt = null;
    qteAttackerQueue = [];
    qteDefenderPrompt = null;
    qteDefenderQueue = [];
  }

  updateQteScoreDisplay();
  updateSharedBar();
  renderQTEWindow();
  startPromptTimer();
}

function createPvpPanel(sideLabel, prompt, queue, color, role) {
  const wrapper = document.createElement("div");
  wrapper.classList.add("qte-player-column");

  const title = document.createElement("div");
  title.classList.add("qte-player-title");
  const roleLabel = role ? ` — ${role.charAt(0).toUpperCase() + role.slice(1)}` : '';
  title.textContent = `${sideLabel}${roleLabel}`;
  wrapper.appendChild(title);

  const keyHint = document.createElement('div');
  keyHint.classList.add('text-muted');
  keyHint.style.fontSize = '12px';
  keyHint.textContent = sideLabel === 'White' ? 'Keys: WASD' : 'Keys: Arrow Keys';
  wrapper.appendChild(keyHint);

  const active = document.createElement("div");
  active.classList.add("qte-prompt", "active-prompt");
  active.textContent = prompt;
  wrapper.appendChild(active);

  const upcoming = document.createElement("div");
  upcoming.classList.add("qte-player-upcoming");
  queue.slice(0, 3).forEach((item) => {
    const div = document.createElement("div");
    div.classList.add("qte-prompt");
    div.textContent = item;
    upcoming.appendChild(div);
  });
  wrapper.appendChild(upcoming);
  return wrapper;
}

function renderQTEWindow() {
  const container = document.getElementById("qte-container");
  container.innerHTML = "";

  if (qteMode === "pvp") {
    // Always show White on the left and Black on the right regardless of roles
    const whiteIsAttacker = qteAttackerColor === 'white';
    const whitePrompt = whiteIsAttacker ? qteAttackerPrompt : qteDefenderPrompt;
    const whiteQueue = whiteIsAttacker ? qteAttackerQueue : qteDefenderQueue;
    const whiteRole = whiteIsAttacker ? 'attacker' : 'defender';

    const blackIsAttacker = qteAttackerColor === 'black';
    const blackPrompt = blackIsAttacker ? qteAttackerPrompt : qteDefenderPrompt;
    const blackQueue = blackIsAttacker ? qteAttackerQueue : qteDefenderQueue;
    const blackRole = blackIsAttacker ? 'attacker' : 'defender';

    // expose current color-based prompts/roles for input handling
    qteWhitePrompt = whitePrompt;
    qteWhiteQueue = whiteQueue;
    qteWhiteRole = whiteRole;
    qteBlackPrompt = blackPrompt;
    qteBlackQueue = blackQueue;
    qteBlackRole = blackRole;

    const whitePanel = createPvpPanel('White', whitePrompt, whiteQueue, 'white', whiteRole);
    const blackPanel = createPvpPanel('Black', blackPrompt, blackQueue, 'black', blackRole);
    container.appendChild(whitePanel);
    container.appendChild(blackPanel);
    return;
  }

  const windowSize = 3;
  for (let i = 0; i < windowSize + 1; i++) {
    const idx = qteIndex + i;
    if (idx >= qteSequence.length) break;
    const div = document.createElement("div");
    div.classList.add("qte-prompt");
    if (i === 0) div.classList.add("active-prompt");
    div.textContent = qteSequence[idx];
    container.appendChild(div);
  }
}

function advancePvpPrompt(player) {
  if (player === "attacker" || player === "both") {
    qteAttackerPrompt = qteAttackerQueue.shift() || randomDirection();
    qteAttackerQueue.push(randomDirection());
  }
  if (player === "defender" || player === "both") {
    qteDefenderPrompt = qteDefenderQueue.shift() || randomDirection();
    qteDefenderQueue.push(randomDirection());
  }
  if (performance.now() - qteSessionStart >= qteSessionDuration) {
    finishQTE();
    return;
  }
  renderQTEWindow();
  startPromptTimer();
}

function startPromptTimer() {
  qteStartTime = performance.now();
  const bar = document.getElementById("qte-bar");
  bar.style.width = "100%";

  if (qteTimerId) cancelAnimationFrame(qteTimerId);
  const step = () => {
    if (!qteActive) return;
    const elapsed = performance.now() - qteStartTime;
    const ratio = 1 - elapsed / qteDuration;
    bar.style.width = Math.max(0, ratio * 100) + "%";
    if (elapsed >= qteDuration) {
      if (qteMode === "pvp") {
        registerMiss("attacker");
        registerMiss("defender");
        advancePvpPrompt("both");
      } else {
        registerMiss();
        nextPromptOrFinish();
      }
    } else {
      qteTimerId = requestAnimationFrame(step);
    }
  };
  qteTimerId = requestAnimationFrame(step);
}

document.addEventListener("keydown", (e) => {
  if (!qteActive) return;
  const elapsed = performance.now() - qteStartTime;
  if (elapsed > qteDuration) return;

  if (qteMode === "pvp") {
    // Left side (White) always uses WASD; Right side (Black) always uses Arrow keys.
    const expectedWhite = PVP_KEYMAPS.attacker[qteWhitePrompt];
    const expectedBlack = PVP_KEYMAPS.defender[qteBlackPrompt];

    if (e.key === expectedWhite) {
      const role = qteWhiteRole || 'attacker';
      registerHit(role, elapsed);
      advancePvpPrompt(role);
    } else if (e.key === expectedBlack) {
      const role = qteBlackRole || 'defender';
      registerHit(role, elapsed);
      advancePvpPrompt(role);
    } else if (ALL_PVP_KEYS.includes(e.key)) {
      const isWASD = Object.values(PVP_KEYMAPS.attacker).includes(e.key);
      if (isWASD) {
        const role = qteWhiteRole || 'attacker';
        registerMiss(role);
        advancePvpPrompt(role);
      } else {
        const role = qteBlackRole || 'defender';
        registerMiss(role);
        advancePvpPrompt(role);
      }
    }
    return;
  }

  const currentPrompt = qteSequence[qteIndex];
  const expectedKey = qteSettings.keymap[currentPrompt];
  const validKeys = Object.values(qteSettings.keymap);

  if (e.key === expectedKey) {
    registerHit(elapsed);
    nextPromptOrFinish();
  } else if (validKeys.includes(e.key)) {
    registerMiss();
    nextPromptOrFinish();
  }
});

function registerHit(playerOrElapsed, elapsedMaybe) {
  const elapsed = typeof playerOrElapsed === "number" ? playerOrElapsed : elapsedMaybe;
  const player = typeof playerOrElapsed === "string" ? playerOrElapsed : null;

  if (sHit) { try { sHit.currentTime = 0; sHit.play(); } catch (e) {} }

  const errorRatio = Math.abs(elapsed - qteDuration / 2) / (qteDuration / 2);
  let points = 0;
  if (errorRatio < 0.2) points = 100;
  else if (errorRatio < 0.5) points = 70;
  else points = 40;

  if (qteMode === "pvp") {
    if (player === "attacker") {
      qteAttackerHits++;
      qteAttackerCombo++;
      if (qteAttackerCombo > qteAttackerMaxCombo) qteAttackerMaxCombo = qteAttackerCombo;
      qteAttackerScore += points;
      qteSharedPosition = Math.min(100, qteSharedPosition + 10);
    } else {
      qteDefenderHits++;
      qteDefenderCombo++;
      if (qteDefenderCombo > qteDefenderMaxCombo) qteDefenderMaxCombo = qteDefenderCombo;
      qteDefenderScore += points;
      qteSharedPosition = Math.max(0, qteSharedPosition - 10);
    }
    updateSharedBar();
    return;
  }

  qteHits++;
  qteCombo++;
  if (qteCombo > qteMaxCombo) qteMaxCombo = qteCombo;
  qteScore += points;
  updateQteScoreDisplay();
}

function registerMiss(player) {
  if (sMiss) { try { sMiss.currentTime = 0; sMiss.play(); } catch (e) {} }

  if (qteMode === "pvp") {
    if (player === "attacker") {
      qteAttackerMisses++;
      qteAttackerCombo = 0;
      qteSharedPosition = Math.max(0, qteSharedPosition - 12);
    } else {
      qteDefenderMisses++;
      qteDefenderCombo = 0;
      qteSharedPosition = Math.min(100, qteSharedPosition + 12);
    }
    updateSharedBar();
    return;
  }

  qteMisses++;
  qteCombo = 0;
  updateQteScoreDisplay();
}

function nextPromptOrFinish() {
  if (qteMode === "pvp") {
    if (performance.now() - qteSessionStart >= qteSessionDuration) {
      finishQTE();
      return;
    }
    advancePvpPrompt("both");
    return;
  }

  qteIndex++;
  if (qteIndex >= qteSequence.length) {
    finishQTE();
  } else {
    renderQTEWindow();
    startPromptTimer();
  }
}

function updateSharedBar() {
  const fill = document.getElementById("qte-shared-bar");
  fill.style.width = `${qteSharedPosition}%`;
  document.getElementById("qte-attacker-score").textContent = qteAttackerScore;
  document.getElementById("qte-defender-score").textContent = qteDefenderScore;
}

function updateQteScoreDisplay() {
  const total = qteHits + qteMisses;
  const acc = total === 0 ? 0 : Math.round((qteHits / total) * 100);
  document.getElementById("qte-score-value").textContent = qteScore;
  document.getElementById("qte-combo").textContent = qteCombo;
  document.getElementById("qte-max-combo").textContent = qteMaxCombo;
  document.getElementById("qte-accuracy").textContent = acc;
}

async function finishQTE() {
  qteActive = false;
  document.getElementById("qte-overlay").style.display = "none";

  const scores = {};
  if (qteMode === "pvp") {
    scores[qteAttackerColor] = qteAttackerScore;
    scores[qteDefenderColor] = qteDefenderScore;
  } else {
    const turnBefore = gameState.turn;
    scores[turnBefore] = qteScore;
    scores[turnBefore === "white" ? "black" : "white"] = 0;
  }

  await apiPost(`/api/qte/${gameId}`, { scores });
  await loadState();
}
</script>
