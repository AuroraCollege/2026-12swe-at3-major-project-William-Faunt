<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>QTE Minigame</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #qte-area {
      margin-top: 3rem;
      text-align: center;
    }
    #qte-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .qte-prompt {
      padding: 10px 16px;
      border-radius: 6px;
      background: #333;
      font-size: 24px;
    }
    .active-prompt {
      background: #ffcc66;
      border: 2px solid #ff9900;
      color: #000;
    }
    #qte-bar-wrapper {
      width: 300px;
      height: 12px;
      background: #444;
      border-radius: 6px;
      overflow: hidden;
      margin: 0.5rem auto;
    }
    #qte-bar {
      height: 100%;
      width: 100%;
      background: #28a745;
      transition: width 0.05s linear;
    }
  </style>
</head>
<body class="bg-dark text-light">
<nav class="navbar navbar-dark bg-black px-3">
  <a href="index.html" class="navbar-brand">← Menu</a>
  <span class="navbar-text">QTE Practice</span>
</nav>

<div class="container" id="qte-area">
  <h2>QTE Minigame</h2>
  <p>Hit the correct key before the bar runs out.</p>

  <div id="qte-container"></div>
  <div id="qte-bar-wrapper"><div id="qte-bar"></div></div>
  <p id="qte-hint" class="text-info mb-1"></p>

  <div class="mb-3">
    <button id="start-qte" class="btn btn-primary">Start</button>
  </div>

  <div id="qte-score" class="text-center">
    <div>Score: <span id="qte-score-value">0</span></div>
    <div>Combo: <span id="qte-combo">0</span> | Max Combo: <span id="qte-max-combo">0</span></div>
    <div>Accuracy: <span id="qte-accuracy">0</span>%</div>
  </div>
</div>

<script src="qte.js"></script>
</body>
</html>
