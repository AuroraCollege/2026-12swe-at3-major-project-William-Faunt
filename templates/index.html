<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<nav class="navbar navbar-dark bg-success px-3">
  <span class="navbar-brand">Chess</span>
</nav>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-6 mb-4">
      <h3>Settings</h3>

      <div class="mb-3">
        <label class="form-label">Difficulty</label>
        <select id="difficulty" class="form-select">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Keybind Preset</label>
        <select id="keybind-preset" class="form-select">
          <option value="WASD">WASD</option>
          <option value="ARROWS">Arrows</option>
          <option value="CUSTOM">Custom</option>
        </select>
      </div>

      <div id="custom-keys" class="border rounded p-3 mb-3" style="display:none;">
        <h5>Custom Keybinds</h5>
        <div class="mb-2">
          <label class="form-label">Up</label>
          <input id="key-up" class="form-control" placeholder="Press a key" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Down</label>
          <input id="key-down" class="form-control" placeholder="Press a key" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Left</label>
          <input id="key-left" class="form-control" placeholder="Press a key" readonly>
        </div>
        <div class="mb-2">
          <label class="form-label">Right</label>
          <input id="key-right" class="form-control" placeholder="Press a key" readonly>
        </div>
      </div>

      <button id="save-settings" class="btn btn-success">Save Settings</button>
      <div id="save-status" class="mt-2 text-info"></div>
      <div id="key-error" class="mt-2 text-danger" style="display:none;"></div>
    </div>

    <div class="col-md-6 mb-4">
      <h3 class="text-align center">Play</h3>
      <a href="/chess" class="btn btn-primary w-100 mb-2">Chess</a>
      <a href="/qte" class="btn btn-warning w-100">Minigame</a>
    </div>
  </div>
</div>

<script>
const defaultKeymaps = {
  WASD: { Up: "w", Down: "s", Left: "a", Right: "d" },
  ARROWS: { Up: "ArrowUp", Down: "ArrowDown", Left: "ArrowLeft", Right: "ArrowRight" }
};

function isDisallowedQteKey(key) {
  if (!key || typeof key !== "string") return true;
  const trimmed = key.trim();
  if (trimmed.length === 0) return true;
  const invalid = new Set([
    " ", "Spacebar", "Space", "Enter", "Tab", "Escape", "Esc",
    "Shift", "Control", "Alt", "Meta", "CapsLock", "NumLock",
    "ScrollLock", "Pause", "ContextMenu", "OS", "Insert", "Home",
    "End", "PageUp", "PageDown", "F1", "F2", "F3", "F4", "F5",
    "F6", "F7", "F8", "F9", "F10", "F11", "F12", "F13", "F14",
    "F15", "F16", "F17", "F18", "F19", "F20", "F21", "F22",
    "F23", "F24", "BrowserBack", "BrowserForward", "BrowserRefresh",
    "BrowserStop", "BrowserSearch", "BrowserFavorites", "BrowserHome",
    "VolumeMute", "VolumeDown", "VolumeUp", "MediaTrackNext",
    "MediaTrackPrevious", "MediaStop", "MediaPlayPause", "PrintScreen",
    "Unidentified", "Dead"
  ]);
  return invalid.has(key);
}

function sanitizeCustomKeymap(keys) {
  if (!keys || typeof keys !== "object") return null;
  const customKeys = {
    Up: keys.Up || "",
    Down: keys.Down || "",
    Left: keys.Left || "",
    Right: keys.Right || ""
  };
  const values = Object.values(customKeys);
  if (values.some(k => isDisallowedQteKey(k))) return null;
  if (new Set(values).size < 4) return null;
  return customKeys;
}

function loadSettings() {
  const stored = JSON.parse(localStorage.getItem("qteSettings") || "{}");
  document.getElementById("difficulty").value = stored.difficulty || "medium";
  let preset = stored.preset || "WASD";
  const sanitizedKeys = sanitizeCustomKeymap(stored.customKeys);

  if (preset === "CUSTOM" && sanitizedKeys) {
    document.getElementById("keybind-preset").value = preset;
    document.getElementById("custom-keys").style.display = "block";
    document.getElementById("key-up").value = sanitizedKeys.Up;
    document.getElementById("key-down").value = sanitizedKeys.Down;
    document.getElementById("key-left").value = sanitizedKeys.Left;
    document.getElementById("key-right").value = sanitizedKeys.Right;
  } else {
    preset = "WASD";
    document.getElementById("keybind-preset").value = "WASD";
    document.getElementById("custom-keys").style.display = "none";
  }
}

document.getElementById("keybind-preset").addEventListener("change", () => {
  const preset = document.getElementById("keybind-preset").value;
  document.getElementById("custom-keys").style.display = preset === "CUSTOM" ? "block" : "none";
});

["key-up","key-down","key-left","key-right"].forEach(id => {
  const input = document.getElementById(id);
  input.addEventListener("focus", () => {
    input.value = "";
  });
  input.addEventListener("keydown", (e) => {
    if (isDisallowedQteKey(e.key)) {
      e.preventDefault();
      const errorEl = document.getElementById("key-error");
      errorEl.textContent = "Invalid key. Space and system keys are not allowed.";
      errorEl.style.display = "block";
      return;
    }
    document.getElementById("key-error").style.display = "none";
    input.value = e.key;
  });
});

document.getElementById("save-settings").addEventListener("click", () => {
  const difficulty = document.getElementById("difficulty").value;
  const preset = document.getElementById("keybind-preset").value;
  let customKeys = null;

  if (preset === "CUSTOM") {
    customKeys = {
      Up: document.getElementById("key-up").value || "w",
      Down: document.getElementById("key-down").value || "s",
      Left: document.getElementById("key-left").value || "a",
      Right: document.getElementById("key-right").value || "d"
    };
    const values = Object.values(customKeys);
    const errorEl = document.getElementById("key-error");
    const invalidKey = values.find(k => isDisallowedQteKey(k));
    if (invalidKey) {
      errorEl.textContent = `Invalid key: ${invalidKey}. Space and system keys are not allowed.`;
      errorEl.style.display = "block";
      return;
    }
    const uniqueValues = new Set(values);
    if (uniqueValues.size < 4) {
      errorEl.textContent = "Error: All keys must be unique!";
      errorEl.style.display = "block";
      return;
    }
    errorEl.style.display = "none";
  }

  const settings = { difficulty, preset, customKeys };
  localStorage.setItem("qteSettings", JSON.stringify(settings));
  document.getElementById("save-status").textContent = "Settings saved.";
  setTimeout(() => document.getElementById("save-status").textContent = "", 2000);
});

loadSettings();
</script>
</body>
</html>
